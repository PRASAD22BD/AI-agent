services:
  # Frontend Service
  - type: web
    name: ai-job-agent-frontend
    env: docker
    region: oregon
    plan: free
    dockerContext: frontend
    dockerFilePath: Dockerfile
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY

  # Backend Service
  - type: web
    name: ai-job-agent-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: backend
    dockerFilePath: Dockerfile
    envVars:
      - key: SUPABASE_URL
      - key: SUPABASE_KEY
      - key: SUPABASE_JWT_SECRET
      - key: GEMINI_API_KEY

  # n8n Service
  - type: web
    name: ai-job-agent-n8n
    env: docker
    region: oregon
    plan: free
    dockerContext: n8n
    dockerFilePath: Dockerfile
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
      - key: N8N_BASIC_AUTH_PASSWORD

  # Playwright Worker
  - type: web
    name: ai-job-agent-playwright
    env: docker
    region: oregon
    plan: free
    dockerContext: playwright
    dockerFilePath: Dockerfile
