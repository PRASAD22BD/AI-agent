services:
  - type: web
    name: ai-agent-frontend
    env: docker
    plan: free
    dockerContext: frontend
    dockerfile: frontend/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: PORT
        value: "3000"

  - type: web
    name: ai-agent-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfile: backend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: ai-agent-n8n
    env: docker
    plan: free
    dockerContext: n8n
    dockerfile: n8n/Dockerfile
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false

  - type: web
    name: ai-agent-playwright
    env: docker
    plan: free
    dockerContext: playwright
    dockerfile: playwright/Dockerfile
