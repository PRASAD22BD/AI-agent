services:
  # 1. Frontend: Next.js 15
  - type: web
    name: ai-agent-frontend
    env: docker
    plan: free
    dockerContext: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # 2. Backend: FastAPI
  - type: web
    name: ai-agent-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /api/v1/
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # 3. Workflow Engine: n8n (Official)
  - type: web
    name: ai-agent-n8n
    env: docker
    plan: free
    dockerContext: n8n
    dockerfilePath: Dockerfile
    envVars:
      - key: N8N_PORT
        value: "5678"
      - key: N8N_RUNNERS_ENABLED
        value: "true"
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false

  # 4. Automation Worker: Playwright
  - type: web
    name: ai-agent-playwright
    env: docker
    plan: free
    dockerContext: playwright
    dockerfilePath: Dockerfile
